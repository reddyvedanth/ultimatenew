name: App CI/CD

on:
  push:
    branches: [main]
    paths:
      - "k8s/app/**"
      - ".github/workflows/app-ci.yml"
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ./k8s/app
          file: ./k8s/app/Dockerfile
          push: true
          tags: |
            ghcr.io/reddyvedanth/ultimatenew/hello:latest
            ghcr.io/reddyvedanth/ultimatenew/hello:${{ github.sha }}

      - name: Update image tag in hello.yaml
        run: |
          sed -i "s|image: ghcr.io/reddyvedanth/ultimatenew/hello:.*|image: ghcr.io/reddyvedanth/ultimatenew/hello:${{ github.sha }}|" k8s/app/hello.yaml

      - name: Commit and push manifest update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/app/hello.yaml
          git diff --staged --quiet || git commit -m "ci: update hello image to ${{ github.sha }}"
          git push
