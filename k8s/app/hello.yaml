apiVersion: v1
kind: Namespace
metadata:
  name: ultimatenew

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hello
  namespace: ultimatenew
spec:
  replicas: 2
  selector:
    matchLabels:
      app: hello
  template:
    metadata:
      labels:
        app: hello
    spec:
      containers:
        - name: nginx
          image: ghcr.io/reddyvedanth/ultimatenew/hello:f1660e9f688c4dc943fb4078685a3dc7c6e04f39
          ports:
            - containerPort: 80  

---
apiVersion: v1
kind: Service
metadata:
  name: hello
  namespace: ultimatenew
spec:
  type: NodePort
  selector:
    app: hello
  ports:
    - port: 80
      targetPort: 80