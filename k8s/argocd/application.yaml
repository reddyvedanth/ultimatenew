apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ultimatenew-app
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/reddyvedanth/ultimatenew.git
    targetRevision: main
    path: k8s/app

  destination:
    server: https://kubernetes.default.svc
    namespace: ultimatenew

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true


